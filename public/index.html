<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hunter Pro | Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0b0e11;
      --card: #181a20;
      --border: #2b2f36;
      --text: #eaecef;
      --text-dim: #848e9c;
      --accent: #6366f1;
      --buy: #0ecb81;
      --sell: #f6465d;
      --nav-bg: #1e2329;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 90px; }

    /* Header */
    .header { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top:0; background: var(--bg); z-index: 100; }
    .brand { font-size: 18px; font-weight: 700; color: var(--text); }
    .brand span { color: var(--accent); }
    .status { font-size: 11px; color: var(--buy); display: flex; align-items: center; gap: 6px; font-weight: 600; }
    .status-dot { width: 8px; height: 8px; background: var(--buy); border-radius: 50%; box-shadow: 0 0 8px var(--buy); }

    .container { padding: 16px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* Summary Dashboard */
    .summary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 24px; }
    .stat-box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
    .stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; }
    .stat-val { font-size: 20px; font-weight: 600; }
    .hero-box { grid-column: span 2; padding: 24px; text-align: center; }
    .hero-pnl { font-size: 32px; font-weight: 700; margin: 4px 0; }

    /* Signal Card - Simpler, cleaner, scanable */
    .signal-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .card-head { display: flex; justify-content: space-between; margin-bottom: 12px; }
    .pair-name { font-size: 16px; font-weight: 600; }
    .time-stamp { font-size: 11px; color: var(--text-dim); }
    
    .data-row { display: grid; grid-template-columns: repeat(3, 1fr); margin-bottom: 12px; border-top: 1px solid var(--border); padding-top: 12px; }
    .data-cell { display: flex; flex-direction: column; gap: 2px; }
    .label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }
    .val { font-size: 13px; font-weight: 500; }

    /* Price Now */
    .price-now-row { display: flex; justify-content: space-between; align-items: center; background: rgba(99, 102, 241, 0.06); border: 1px solid rgba(99, 102, 241, 0.15); border-radius: 8px; padding: 10px 12px; margin-bottom: 12px; }
    .price-now-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; font-weight: 600; }
    .price-now-val { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; transition: color 0.3s; }
    .price-now-pnl { font-size: 11px; font-weight: 600; margin-top: 2px; }
    .price-flash-up { animation: flashUp 0.6s ease-out; }
    .price-flash-down { animation: flashDown 0.6s ease-out; }
    @keyframes flashUp { 0% { background: rgba(14, 203, 129, 0.25); } 100% { background: transparent; } }
    @keyframes flashDown { 0% { background: rgba(246, 70, 93, 0.25); } 100% { background: transparent; } }

    .card-foot { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 12px; }
    .side-tag { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; }
    .side-buy { background: rgba(14, 203, 129, 0.15); color: var(--buy); }
    .side-sell { background: rgba(246, 70, 93, 0.15); color: var(--sell); }
    .status-tag { font-size: 10px; color: var(--text-dim); border: 1px solid var(--border); padding: 2px 6px; border-radius: 4px; }
    .status-hit { background: rgba(99, 102, 241, 0.1); color: var(--accent); border-color: var(--accent); }

    /* Target Row Styling */
    .target-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
    .target-item { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; padding: 6px 4px; text-align: center; display: flex; flex-direction: column; gap: 2px; }
    .target-label { font-size: 9px; color: var(--text-dim); font-weight: 600; }
    .target-val { font-size: 11px; font-weight: 500; }
    
    .hit-tp { background: rgba(14, 203, 129, 0.15); border-color: rgba(14, 203, 129, 0.3); color: var(--buy); }
    .hit-sl { background: rgba(246, 70, 93, 0.15); border-color: rgba(246, 70, 93, 0.3); color: var(--sell); }

    .res-val { font-size: 15px; font-weight: 700; }
    .pos { color: var(--buy); }
    .neg { color: var(--sell); }

    /* Navigation */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--nav-bg); height: 70px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); z-index: 1000; }
    .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-dim); font-size: 10px; text-decoration: none; width: 33%; opacity: 0.7; }
    .nav-btn.active { color: var(--accent); opacity: 1; }
    .nav-btn svg { width: 20px; height: 20px; }

    /* Chart Panels */
    .panel { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .panel-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .panel-desc { font-size: 11px; color: var(--text-dim); margin-bottom: 16px; }

    /* Responsive */
    @media (min-width: 600px) {
      .container { max-width: 500px; margin: 0 auto; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="brand">Hunter <span>Pro</span></div>
    <div class="status"><div class="status-dot"></div>Sinyal Aktif</div>
  </header>

  <main class="container">
    
    <!-- BERANDA: Ringkasan -->
    <div id="tab-home" class="tab-content active">
      <div class="summary-grid">
        <div class="stat-box hero-box">
          <div class="stat-label">Total Performance</div>
          <div class="hero-pnl" id="hpnl">0.00%</div>
          <div class="stat-label" style="font-size: 10px;" id="hwin">Memuat data...</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Win Rate</div>
          <div class="stat-val" id="macc">— %</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Open Trade</div>
          <div class="stat-val" id="mactive">0</div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Growth Curve</div>
        <canvas id="pnlChart" height="150"></canvas>
      </div>
    </div>

    <!-- SINYAL: Riwayat -->
    <div id="tab-signals" class="tab-content">
      <div id="signalContainer">
        <div style="text-align:center; padding:100px 20px; color:var(--text-dim); font-size: 13px;">
          Menunggu data dari pasar...
        </div>
      </div>
    </div>

    <!-- ANALISA: Grafik Strategi -->
    <div id="tab-charts" class="tab-content">
      <div class="panel">
        <div class="panel-title">Win Rate Ratio</div>
        <div style="height:180px; position:relative;">
          <canvas id="accuracyDonut"></canvas>
          <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center;">
             <div id="gaugeVal" style="font-size:24px; font-weight:700;">0%</div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Top Strategies</div>
        <div style="height:200px;">
          <canvas id="strategyBar"></canvas>
        </div>
      </div>
    </div>

  </main>

  <nav class="bottom-nav">
    <div class="nav-btn active" onclick="switchTab('home', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
      <span>Dashboard</span>
    </div>
    <div class="nav-btn" onclick="switchTab('signals', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
      <span>Signals</span>
    </div>
    <div class="nav-btn" onclick="switchTab('charts', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path><path d="M22 12A10 10 0 0 0 12 2v10z"></path></svg>
      <span>Stats</span>
    </div>
  </nav>

  <script>
    const SUPA_URL = 'https://hgcsdpqceuhmpeksdhpj.supabase.co';
    const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhnY3NkcHFjZXVobXBla3NkaHBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MzU0NTMsImV4cCI6MjA4OTQxMTQ1M30.Llo6V1m4qdzXq3b3cB54cp7iEVrhpQ9nipBFbpcaWFQ';

    let charts = {};

    function switchTab(id, el) {
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
      document.getElementById('tab-' + id).classList.add('active');
      el.classList.add('active');
    }

    async function fetchData() {
      try {
        const res = await fetch(SUPA_URL + '/rest/v1/signals?select=*&order=sent_at.desc&limit=50', { 
          headers: { apikey: SUPA_KEY, Authorization: 'Bearer ' + SUPA_KEY } 
        });
        if (!res.ok) throw new Error('Query error');
        const signals = await res.json();
        if (!Array.isArray(signals)) return;

        // Statistics
        const closed = signals.filter(s => s.status !== 'ACTIVE');
        const activeCount = signals.filter(s => s.status === 'ACTIVE').length;
        const wins = closed.filter(s => s.status.includes('TP'));
        const losses = closed.filter(s => s.status === 'SL_HIT');
        
        const winRate = closed.length > 0 ? ((wins.length / closed.length) * 100).toFixed(0) : 0;
        const totalPnl = closed.reduce((acc, s) => acc + (parseFloat(s.profit_pct) || 0), 0);

        // Update UI
        const hpnl = document.getElementById('hpnl');
        hpnl.textContent = (totalPnl >= 0 ? '+' : '') + totalPnl.toFixed(2) + '%';
        hpnl.className = 'hero-pnl ' + (totalPnl >= 0 ? 'pos' : 'neg');
        document.getElementById('hwin').textContent = `${wins.length} Win • ${losses.length} Loss • ${activeCount} Active`;
        document.getElementById('macc').textContent = winRate + '%';
        document.getElementById('mactive').textContent = activeCount;
        document.getElementById('gaugeVal').textContent = winRate + '%';

        // Render Cards
        const container = document.getElementById('signalContainer');
        container.innerHTML = signals.map(s => {
          const side = s.signal === 'STRONG BUY' ? 'LONG' : 'SHORT';
          const pnl = parseFloat(s.profit_pct || 0);
          const time = new Date(s.sent_at || s.created_at).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
          const date = new Date(s.sent_at || s.created_at).toLocaleDateString('id-ID', { day: '2-digit', month: 'short' });

          // Status & Target Styling
          const status = s.status || 'ACTIVE';
          const isTP1 = status.includes('TP1');
          const isTP2 = status.includes('TP2');
          const isTP3 = status.includes('TP3');
          const isSL = status === 'SL_HIT';

          return `
            <div class="signal-card">
              <div class="card-head">
                <span class="pair-name">${s.symbol}</span>
                <span class="time-stamp">${date} • ${time}</span>
              </div>
              
              <div class="data-row" style="margin-bottom: 8px;">
                <div class="data-cell"><span class="label">Entry</span><span class="val">${parseFloat(s.entry_price || 0).toFixed(4)}</span></div>
                <div class="data-cell"><span class="label">Score</span><span class="val">${s.score || 0}</span></div>
                <div class="data-cell" style="text-align:right"><span class="label">Side</span><span class="val ${side === 'LONG' ? 'pos' : 'neg'}">${side}</span></div>
              </div>

              <div class="price-now-row" data-symbol="${s.symbol}" data-entry="${parseFloat(s.entry_price || 0)}" data-side="${side}">
                <div>
                  <div class="price-now-label">💰 Harga Sekarang</div>
                  <div class="price-now-val">—</div>
                </div>
                <div style="text-align:right">
                  <div class="price-now-label">P&L dari Entry</div>
                  <div class="price-now-pnl">—</div>
                </div>
              </div>

              <div class="target-row">
                <div class="target-item ${isSL ? 'hit-sl' : ''}">
                  <span class="target-label">SL ${isSL ? '❌' : '🛡️'}</span>
                  <span class="target-val">${parseFloat(s.sl || 0).toFixed(4)}</span>
                </div>
                <div class="target-item ${isTP1 || isTP2 || isTP3 ? 'hit-tp' : ''}">
                  <span class="target-label">TP1 ${isTP1 || isTP2 || isTP3 ? '✅' : '⏳'}</span>
                  <span class="target-val">${parseFloat(s.tp1 || 0).toFixed(4)}</span>
                </div>
                <div class="target-item ${isTP2 || isTP3 ? 'hit-tp' : ''}">
                  <span class="target-label">TP2 ${isTP2 || isTP3 ? '✅' : '⏳'}</span>
                  <span class="target-val">${parseFloat(s.tp2 || 0).toFixed(4)}</span>
                </div>
                <div class="target-item ${isTP3 ? 'hit-tp' : ''}">
                  <span class="target-label">TP3 ${isTP3 ? '🏆' : '⏳'}</span>
                  <span class="target-val">${parseFloat(s.tp3 || 0).toFixed(4)}</span>
                </div>
              </div>

              <div class="card-foot">
                <div style="display:flex; gap:8px; align-items:center;">
                  <span class="side-tag ${side === 'LONG' ? 'side-buy' : 'side-sell'}">${side}</span>
                  <span class="status-tag ${status !== 'ACTIVE' ? 'status-hit' : ''}">${status === 'ACTIVE' ? '⌛ WAITING' : '🎯 ' + status}</span>
                </div>
                <div class="res-val ${pnl >= 0 ? 'pos' : 'neg'}">
                  ${status === 'ACTIVE' ? '—' : (pnl >= 0 ? '+' : '') + pnl.toFixed(1) + '%'}
                </div>
              </div>
            </div>
          `;
        }).join('');

        // Refresh Charts
        drawCharts(closed, winRate, signals);

      } catch (e) { console.error(e); }
    }

    function drawCharts(closed, wr, all) {
      // 1. Line Chart (Growth Curve)
      // Filter data valid & sort by time
      const sorted = [...closed]
        .filter(s => s.sent_at && !isNaN(parseFloat(s.profit_pct)))
        .sort((a,b) => new Date(a.sent_at) - new Date(b.sent_at));
      
      // Start with a 0 point to prevent 'infinity' scaling or floating lines
      let cum = 0;
      const points = [0]; 
      const labels = ["Start"];

      sorted.forEach(s => { 
        cum += parseFloat(s.profit_pct || 0); 
        points.push(cum);
        labels.push(new Date(s.sent_at).toLocaleDateString('id-ID', { day: '2-digit', month: 'short' }));
      });

      if (charts.pnl) charts.pnl.destroy();
      
      // Only draw if we have at least 1 actual trade (2 points including Start)
      if (points.length >= 2) {
        charts.pnl = new Chart(document.getElementById('pnlChart').getContext('2d'), {
          type: 'line',
          data: { 
            labels, 
            datasets: [{ 
              data: points, 
              borderColor: '#6366f1', 
              borderWidth: 2.5, 
              tension: 0.3, 
              pointRadius: 2, 
              fill: true,
              backgroundColor: 'rgba(99, 102, 241, 0.05)'
            }] 
          },
          options: { 
            responsive: true, 
            maintainAspectRatio: false, 
            plugins: { legend: { display:false } }, 
            scales: { 
              x: { display: false }, 
              y: { 
                beginAtZero: true, 
                ticks: { color: '#848e9c', font: { size: 9 }, callback: v => v.toFixed(1) + '%' } 
              } 
            } 
          }
        });
      }

      // 2. Donut (Win Rate)
      if (charts.donut) charts.donut.destroy();
      charts.donut = new Chart(document.getElementById('accuracyDonut'), {
        type: 'doughnut',
        data: { datasets: [{ data: [wr, 100-wr], backgroundColor: ['#0ecb81', '#2b2f36'], borderWidth: 0, cutout: '85%' }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display:false } } }
      });

      // 3. Bar (Strategies)
      const sMap = {};
      all.forEach(s => { const t = (s.signal_type || 'Other').split(' ')[0]; sMap[t] = (sMap[t] || 0) + 1; });
      const labs = Object.keys(sMap);
      if (charts.bar) charts.bar.destroy();
      charts.bar = new Chart(document.getElementById('strategyBar'), {
        type: 'bar',
        data: { labels: labs, datasets: [{ data: labs.map(k => sMap[k]), backgroundColor: '#6366f1', borderRadius: 4 }] },
        options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display:false } }, scales: { x: { display: false }, y: { ticks: { color: '#eaecef', font: { size: 10 } } } } }
      });
    }

    // ── Live Price Tracker (Direct Binance API) ──
    let lastPrices = {};

    async function fetchLivePrices() {
      try {
        // Collect unique symbols from signal cards
        const rows = document.querySelectorAll('.price-now-row[data-symbol]');
        if (rows.length === 0) return;

        const symbols = [...new Set([...rows].map(r => r.dataset.symbol))];
        if (symbols.length === 0) return;

        // Fetch prices from Binance API for these specific symbols
        const prices = {};
        try {
          const query = symbols.map(s => `"${s}"`).join(',');
          const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbols=[${query}]`);
          if (res.ok) {
            const data = await res.json();
            if (Array.isArray(data)) {
              data.forEach(item => { prices[item.symbol] = parseFloat(item.price); });
            }
          }
        } catch (_) {}

        // Fallback: fetch individually for symbols not found in batch
        const missing = symbols.filter(s => !prices[s]);
        await Promise.allSettled(missing.map(async sym => {
          try {
            const r = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${sym}`);
            if (r.ok) {
              const d = await r.json();
              if (d && d.price) prices[d.symbol] = parseFloat(d.price);
            }
          } catch (_) {}
        }));

        rows.forEach(row => {
          const sym = row.dataset.symbol;
          const price = prices[sym];
          if (!price || isNaN(price)) return;

          const valEl = row.querySelector('.price-now-val');
          const pnlEl = row.querySelector('.price-now-pnl');
          const prec = price < 1 ? 6 : price < 100 ? 4 : 2;
          valEl.textContent = price.toFixed(prec);

          // Flash animation on price change
          if (lastPrices[sym] !== undefined && lastPrices[sym] !== price) {
            const dir = price > lastPrices[sym] ? 'up' : 'down';
            valEl.style.color = dir === 'up' ? 'var(--buy)' : 'var(--sell)';
            row.classList.remove('price-flash-up', 'price-flash-down');
            void row.offsetWidth;
            row.classList.add(dir === 'up' ? 'price-flash-up' : 'price-flash-down');
          }
          lastPrices[sym] = price;

          // P&L from entry
          const entry = parseFloat(row.dataset.entry);
          const side = row.dataset.side;
          if (entry > 0) {
            let pnl = ((price - entry) / entry) * 100;
            if (side === 'SHORT') pnl = -pnl;
            const arrow = pnl >= 0 ? '▲' : '▼';
            pnlEl.textContent = `${arrow} ${pnl >= 0 ? '+' : ''}${pnl.toFixed(2)}%`;
            pnlEl.className = 'price-now-pnl ' + (pnl >= 0 ? 'pos' : 'neg');
          }
        });
      } catch (e) { console.warn('Price fetch error:', e); }
    }

    fetchData();
    setInterval(fetchData, 45000);
    setTimeout(fetchLivePrices, 3000); // First price load after signals render
    setInterval(fetchLivePrices, 5000);
  </script>
</body>
</html>

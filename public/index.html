<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signal Performance Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:#0a0e17; color:#e1e5ee; min-height:100vh; }
    
    .header { background:linear-gradient(135deg,#0f1629,#1a1f3a); padding:20px 30px; border-bottom:1px solid #1e2642; display:flex; justify-content:space-between; align-items:center; }
    .header h1 { font-size:20px; font-weight:600; background:linear-gradient(135deg,#60a5fa,#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .header .status { font-size:12px; color:#94a3b8; }
    .header .status .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#22c55e; margin-right:6px; animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

    .container { max-width:1200px; margin:0 auto; padding:20px; }

    .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin-bottom:24px; }
    .stat-card { background:linear-gradient(135deg,#111827,#1a1f3a); border:1px solid #1e2642; border-radius:12px; padding:20px; position:relative; overflow:hidden; }
    .stat-card::after { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
    .stat-card.blue::after { background:linear-gradient(90deg,#3b82f6,#60a5fa); }
    .stat-card.green::after { background:linear-gradient(90deg,#22c55e,#4ade80); }
    .stat-card.red::after { background:linear-gradient(90deg,#ef4444,#f87171); }
    .stat-card.purple::after { background:linear-gradient(90deg,#8b5cf6,#a78bfa); }
    .stat-card.amber::after { background:linear-gradient(90deg,#f59e0b,#fbbf24); }
    .stat-label { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:#64748b; margin-bottom:8px; }
    .stat-value { font-size:28px; font-weight:700; }
    .stat-sub { font-size:12px; color:#64748b; margin-top:4px; }

    .panels { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:24px; }
    @media(max-width:768px) { .panels { grid-template-columns:1fr; } }

    .panel { background:linear-gradient(135deg,#111827,#1a1f3a); border:1px solid #1e2642; border-radius:12px; padding:20px; }
    .panel h2 { font-size:14px; font-weight:600; color:#94a3b8; margin-bottom:16px; text-transform:uppercase; letter-spacing:1px; }

    .table-wrap { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th { text-align:left; padding:10px 12px; color:#64748b; font-weight:500; border-bottom:1px solid #1e2642; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; }
    td { padding:10px 12px; border-bottom:1px solid #111827; }
    tr:hover { background:rgba(59,130,246,0.05); }
    
    .badge { display:inline-block; padding:3px 8px; border-radius:6px; font-size:11px; font-weight:600; }
    .badge.buy { background:rgba(34,197,94,0.15); color:#4ade80; }
    .badge.sell { background:rgba(239,68,68,0.15); color:#f87171; }
    .badge.active { background:rgba(59,130,246,0.15); color:#60a5fa; }
    .badge.tp { background:rgba(34,197,94,0.15); color:#4ade80; }
    .badge.sl { background:rgba(239,68,68,0.15); color:#f87171; }
    .badge.expired { background:rgba(148,163,184,0.15); color:#94a3b8; }

    .profit-pos { color:#4ade80; }
    .profit-neg { color:#f87171; }

    .loading { text-align:center; padding:40px; color:#64748b; }
    .empty { text-align:center; padding:30px; color:#475569; font-size:13px; }

    .filter-bar { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
    .filter-btn { padding:6px 14px; border-radius:8px; border:1px solid #1e2642; background:transparent; color:#94a3b8; font-size:12px; cursor:pointer; font-family:'Inter',sans-serif; transition:all 0.2s; }
    .filter-btn:hover { border-color:#3b82f6; color:#60a5fa; }
    .filter-btn.active { background:rgba(59,130,246,0.15); border-color:#3b82f6; color:#60a5fa; }
  </style>
</head>
<body>
  <div class="header">
    <h1>📊 Signal Performance Dashboard</h1>
    <div class="status"><span class="dot"></span>Live — Auto-refresh 30s</div>
  </div>
  <div class="container">
    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all')">All</button>
      <button class="filter-btn" onclick="setFilter('today')">Today</button>
      <button class="filter-btn" onclick="setFilter('7d')">7 Days</button>
      <button class="filter-btn" onclick="setFilter('30d')">30 Days</button>
    </div>

    <div class="stats-grid" id="statsGrid">
      <div class="stat-card blue"><div class="stat-label">Total Signals</div><div class="stat-value" id="totalSignals">—</div></div>
      <div class="stat-card green"><div class="stat-label">Win Rate</div><div class="stat-value" id="winRate">—</div><div class="stat-sub" id="winSub"></div></div>
      <div class="stat-card purple"><div class="stat-label">Avg Profit</div><div class="stat-value" id="avgProfit">—</div></div>
      <div class="stat-card green"><div class="stat-label">Best Trade</div><div class="stat-value" id="bestTrade">—</div><div class="stat-sub" id="bestSub"></div></div>
      <div class="stat-card red"><div class="stat-label">Worst Trade</div><div class="stat-value" id="worstTrade">—</div><div class="stat-sub" id="worstSub"></div></div>
      <div class="stat-card amber"><div class="stat-label">Active Now</div><div class="stat-value" id="activeNow">—</div></div>
    </div>

    <div class="panels">
      <div class="panel">
        <h2>Win Rate by Signal Type</h2>
        <canvas id="typeChart" height="200"></canvas>
      </div>
      <div class="panel">
        <h2>Cumulative P&L</h2>
        <canvas id="pnlChart" height="200"></canvas>
      </div>
    </div>

    <div class="panel">
      <h2>Signal History</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Time</th><th>Symbol</th><th>Signal</th><th>Type</th><th>Entry</th><th>Score</th><th>Status</th><th>Profit</th><th>Duration</th></tr>
          </thead>
          <tbody id="signalTable"><tr><td colspan="9" class="loading">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const SUPA_URL = 'https://hgcsdpqceuhmpeksdhpj.supabase.co';
    const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhnY3NkcHFjZXVobXBla3NkaHBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MzU0NTMsImV4cCI6MjA4OTQxMTQ1M30.Llo6V1m4qdzXq3b3cB54cp7iEVrhpQ9nipBFbpcaWFQ';

    let currentFilter = 'all';
    let typeChartInstance = null;
    let pnlChartInstance = null;

    function setFilter(f) {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      loadData();
    }

    async function fetchSignals() {
      let url = SUPA_URL + '/rest/v1/signals?select=*&order=sent_at.desc';
      if (currentFilter === 'today') {
        const today = new Date(); today.setHours(0,0,0,0);
        url += '&sent_at=gte.' + today.toISOString();
      } else if (currentFilter === '7d') {
        const d = new Date(); d.setDate(d.getDate()-7);
        url += '&sent_at=gte.' + d.toISOString();
      } else if (currentFilter === '30d') {
        const d = new Date(); d.setDate(d.getDate()-30);
        url += '&sent_at=gte.' + d.toISOString();
      }
      const res = await fetch(url, { headers: { apikey: SUPA_KEY, Authorization: 'Bearer ' + SUPA_KEY } });
      return await res.json();
    }

    async function loadData() {
      try {
        const signals = await fetchSignals();
        if (!Array.isArray(signals) || signals.length === 0) {
          document.getElementById('totalSignals').textContent = '0';
          document.getElementById('winRate').textContent = '—';
          document.getElementById('avgProfit').textContent = '—';
          document.getElementById('bestTrade').textContent = '—';
          document.getElementById('worstTrade').textContent = '—';
          document.getElementById('activeNow').textContent = '0';
          document.getElementById('signalTable').innerHTML = '<tr><td colspan="9" class="empty">No signals yet. Waiting for first signal...</td></tr>';
          return;
        }

        const wins = signals.filter(s => s.status && s.status.includes('TP'));
        const losses = signals.filter(s => s.status === 'SL_HIT');
        const active = signals.filter(s => s.status === 'ACTIVE');
        const closed = signals.filter(s => s.status !== 'ACTIVE');
        const winRate = (wins.length + losses.length) > 0 ? (wins.length / (wins.length + losses.length) * 100).toFixed(1) : 0;
        const profits = closed.filter(s => s.profit_pct != null).map(s => parseFloat(s.profit_pct));
        const avgProfit = profits.length > 0 ? (profits.reduce((a,b) => a+b, 0) / profits.length).toFixed(2) : 0;
        const best = signals.reduce((a,s) => (parseFloat(s.profit_pct||0) > a.pct ? {sym:s.symbol, pct:parseFloat(s.profit_pct)} : a), {sym:'-',pct:-999});
        const worst = signals.reduce((a,s) => (parseFloat(s.profit_pct||0) < a.pct ? {sym:s.symbol, pct:parseFloat(s.profit_pct)} : a), {sym:'-',pct:999});

        document.getElementById('totalSignals').textContent = signals.length;
        document.getElementById('winRate').textContent = winRate + '%';
        document.getElementById('winSub').textContent = wins.length + 'W / ' + losses.length + 'L';
        document.getElementById('avgProfit').textContent = (avgProfit >= 0 ? '+' : '') + avgProfit + '%';
        document.getElementById('avgProfit').className = 'stat-value ' + (avgProfit >= 0 ? 'profit-pos' : 'profit-neg');
        document.getElementById('bestTrade').textContent = '+' + (best.pct > -999 ? best.pct.toFixed(2) : 0) + '%';
        document.getElementById('bestSub').textContent = best.sym;
        document.getElementById('worstTrade').textContent = (worst.pct < 999 ? worst.pct.toFixed(2) : 0) + '%';
        document.getElementById('worstSub').textContent = worst.sym;
        document.getElementById('activeNow').textContent = active.length;

        // Table
        let html = '';
        signals.forEach(s => {
          const time = s.sent_at ? new Date(s.sent_at).toLocaleString('id-ID', {timeZone:'Asia/Jakarta', day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'}) : '-';
          const sigClass = s.signal === 'STRONG BUY' ? 'buy' : 'sell';
          const statusClass = s.status === 'ACTIVE' ? 'active' : (s.status === 'SL_HIT' ? 'sl' : s.status === 'EXPIRED' ? 'expired' : 'tp');
          const pct = s.profit_pct != null ? parseFloat(s.profit_pct) : null;
          const profitHtml = pct !== null ? '<span class="' + (pct >= 0 ? 'profit-pos' : 'profit-neg') + '">' + (pct >= 0 ? '+' : '') + pct.toFixed(2) + '%</span>' : '—';
          html += '<tr>' +
            '<td>' + time + '</td>' +
            '<td><strong>' + s.symbol + '</strong></td>' +
            '<td><span class="badge ' + sigClass + '">' + (s.signal === 'STRONG BUY' ? 'BUY' : 'SELL') + '</span></td>' +
            '<td>' + (s.signal_type || '-') + '</td>' +
            '<td>' + (parseFloat(s.entry_price)||0).toFixed(4) + '</td>' +
            '<td>' + (s.score || '-') + '</td>' +
            '<td><span class="badge ' + statusClass + '">' + (s.status || 'ACTIVE') + '</span></td>' +
            '<td>' + profitHtml + '</td>' +
            '<td>' + (s.duration || '—') + '</td>' +
            '</tr>';
        });
        document.getElementById('signalTable').innerHTML = html || '<tr><td colspan="9" class="empty">No signals</td></tr>';

        // Charts
        renderTypeChart(signals);
        renderPnlChart(signals);
      } catch(e) {
        console.error('Load error:', e);
        document.getElementById('signalTable').innerHTML = '<tr><td colspan="9" class="empty">Error loading data: ' + e.message + '</td></tr>';
      }
    }

    function renderTypeChart(signals) {
      const types = {};
      signals.forEach(s => {
        const t = s.signal_type || 'UNKNOWN';
        if (!types[t]) types[t] = { wins:0, losses:0 };
        if (s.status && s.status.includes('TP')) types[t].wins++;
        if (s.status === 'SL_HIT') types[t].losses++;
      });
      const labels = Object.keys(types);
      const winRates = labels.map(t => {
        const total = types[t].wins + types[t].losses;
        return total > 0 ? (types[t].wins / total * 100).toFixed(1) : 0;
      });

      if (typeChartInstance) typeChartInstance.destroy();
      typeChartInstance = new Chart(document.getElementById('typeChart'), {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            label: 'Win Rate %',
            data: winRates,
            backgroundColor: ['#3b82f6','#8b5cf6','#f59e0b','#22c55e'],
            borderRadius: 6
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true, max: 100, ticks: { color: '#64748b', callback: v => v+'%' }, grid: { color: '#1e2642' } },
            x: { ticks: { color: '#94a3b8', font: { size: 11 } }, grid: { display: false } }
          }
        }
      });
    }

    function renderPnlChart(signals) {
      const sorted = signals.filter(s => s.profit_pct != null && s.status !== 'ACTIVE').sort((a,b) => new Date(a.sent_at) - new Date(b.sent_at));
      let cum = 0;
      const labels = sorted.map(s => new Date(s.sent_at).toLocaleDateString('id-ID', {day:'2-digit',month:'short'}));
      const data = sorted.map(s => { cum += parseFloat(s.profit_pct); return parseFloat(cum.toFixed(2)); });

      if (pnlChartInstance) pnlChartInstance.destroy();
      pnlChartInstance = new Chart(document.getElementById('pnlChart'), {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: 'Cumulative P&L %',
            data,
            borderColor: '#60a5fa',
            backgroundColor: 'rgba(96,165,250,0.1)',
            fill: true,
            tension: 0.3,
            pointRadius: 3,
            pointBackgroundColor: data.map(v => v >= 0 ? '#4ade80' : '#f87171')
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            y: { ticks: { color: '#64748b', callback: v => v+'%' }, grid: { color: '#1e2642' } },
            x: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { display: false } }
          }
        }
      });
    }

    loadData();
    setInterval(loadData, 30000);
  </script>
</body>
</html>
